name: Bug report
description: Report a reproducible problem with dBconverter
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a problem. Please do not include sensitive information.

  - type: textarea
    id: description
    attributes:
      label: Problem description
      description: What happened, and what did you expect to happen?
      placeholder: Describe the problem clearly.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the smallest sequence of actions that reproduces the problem.
      placeholder: |
        1. Open ...
        2. Select ...
        3. Enter ...
        4. See ...
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser
      description: Include the browser name and version when possible.
      placeholder: Example: Chrome 137
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Operating system and device
      placeholder: Example: Windows 11 desktop or Android smartphone
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional information
      description: Add screenshots or other useful context if available.

  - type: checkboxes
    id: checks
    attributes:
      label: Confirmation
      options:
        - label: I searched existing issues for the same problem.
          required: true
        - label: I did not include passwords, credentials, or personal information.
          required: true
